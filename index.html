<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">

    <title>Instagram</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">  
    <style>  
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }  
        .insta-input { background-color: #121212; border: 1px solid #3a3a3a; color: #f5f5f5; font-size: 15px; }  
        .insta-input:focus { border-color: #555; outline: none; box-shadow: 0 0 0 1px #555; }  
        .insta-btn { background-color: #0095f6; font-weight: 600; font-size: 15px; }  
    </style>

<body class="bg-black text-white">  
    <div class="max-w-[380px] mx-auto min-h-screen flex flex-col px-6 pt-6">  <!-- Language -->  
    <div class="flex justify-center mb-8">  
        <div onclick="showLanguageMenu()" class="flex items-center gap-1 text-sm text-zinc-300 cursor-pointer px-4 py-1 hover:bg-zinc-900 rounded-full">  
            <span>English (India)</span>  
            <i class="fas fa-chevron-down text-xs ml-1"></i>  
        </div>  
    </div>  

    <!-- Logo -->  
    <div class="flex justify-center mb-10">  
        <img src="instagram.png" alt="Instagram" class="w-[82px] h-[82px]">  
    </div>  

    <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-3">  
        <input type="text" id="username" placeholder="Username, email address or mobile number"   
               class="insta-input w-full px-4 py-[13px] rounded-3xl" required>  
          
        <div class="relative">  
            <input type="password" id="password" placeholder="Password"   
                   class="insta-input w-full px-4 py-[13px] rounded-3xl pr-12" required>  
            <button type="button" onclick="togglePassword()"   
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400">  
                <i class="fas fa-eye" id="eyeIcon"></i>  
            </button>  
        </div>  

        <button type="submit" class="insta-btn w-full py-3 text-white rounded-full mt-2">  
            Log in  
        </button>  
    </form>  

    <div class="text-center mt-5">  
        <button onclick="forgotPassword()" class="text-[#0095f6] text-sm font-medium">Forgotten password?</button>  
    </div>  

    <div class="flex-1"></div>  

    <div class="pb-6">  
        <button onclick="showCreateAccountModal()"   
                class="w-full py-3 border border-[#0095f6] text-[#0095f6] font-semibold rounded-full text-sm">  
            Create new account  
        </button>  
    </div>  

    <div class="flex justify-center items-center gap-1 pb-8 text-zinc-400 text-xs">  
        <span>∞</span> <span>Meta</span>  
    </div>  
</div>  

<script>  
    function togglePassword() {  
        const pass = document.getElementById('password');  
        const eye = document.getElementById('eyeIcon');  
        if (pass.type === 'password') {  
            pass.type = 'text';  
            eye.classList.replace('fa-eye', 'fa-eye-slash');  
        } else {  
            pass.type = 'password';  
            eye.classList.replace('fa-eye-slash', 'fa-eye');  
        }  
    }  

    function handleLogin(e) {  
        e.preventDefault();  
          
        const username = document.getElementById('username').value.trim();  
        const password = document.getElementById('password').value.trim();  

        // === YEH IMPORTANT HAI ===  
        // Jo bhi user daalega, yeh console aur alert mein dikhega  
        console.log("Username entered:", username);  
        console.log("Password entered:", password);  

        alert("Entered Username: " + username + "\nEntered Password: " + password);  

        // Demo check (sirf demo ke liye)  
        if ((username.toLowerCase() === 'demo' || username === 'user@example.com') && password === 'demo123') {  
            alert("Demo login successful!");  
        } else {  
            alert("Invalid credentials (demo mode)");  
        }  
    }  

    function forgotPassword() {  
        alert("Password reset link sent (demo)");  
    }  

    function showCreateAccountModal() {  
        alert("Create account modal would open here (demo)");  
    }  

    function showLanguageMenu() {  
        alert("Language menu (demo)");  
    }  

    window.onload = () => {  
        document.getElementById('username').focus();  
        console.log("%c[Demo] Open console (F12) to see entered username & password", "color:#666");  
    };
